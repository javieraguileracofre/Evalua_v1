# Blueprint Render: https://render.com/docs/blueprint-spec
#
# Uso: Dashboard → New → Blueprint → repo GitHub javieraguileracofre/Evalua_v1.
# También puedes crear solo "Web Service" desde el mismo repo (Runtime: Docker);
# entonces este archivo sirve de referencia; variables sensibles en el panel.
#
# Postgres: crea "PostgreSQL" en Render, copia Internal Database URL en DATABASE_URL
# al desplegar (una sola variable basta: PLATFORM_DATABASE_URL se deduce si falta).
# Si POST /login devuelve 500 y en logs aparece "No existe tenant_code": en Supabase
# cree la fila en public.tenants, o en Environment ponga EVALUA_SINGLE_DB_TENANT=true
# (un solo Postgres sin tabla tenants).
# DATABASE_URL con db.*.supabase.co:5432 (IPv6) en Render: la app reescribe al pooler :6543;
# ajusta SUPABASE_POOLER_HOST si tu proyecto usa otro host del panel Connect.
#
# Python nativo en Render (sin Docker): el default 3.14 fuerza build Rust de pydantic-core.
# Fija versión con .python-version en la raíz o PYTHON_VERSION (evita pydantic-core build en 3.14).

services:
  - type: web
    name: evalua-v1
    runtime: docker
    branch: main
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.11"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: DEFAULT_TENANT_CODE
        value: athletic
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
