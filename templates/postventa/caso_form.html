{% extends "layout/base.html" %}

{% block title %}Nuevo caso · Postventa{% endblock %}

{% block breadcrumbs %}
<li class="breadcrumb-item"><a href="{{ request.url_for('menu_principal') }}">Inicio</a></li>
<li class="breadcrumb-item"><a href="{{ request.url_for('postventa_hub') }}">Postventa</a></li>
<li class="breadcrumb-item"><a href="{{ request.url_for('postventa_casos_lista') }}">Casos</a></li>
<li class="breadcrumb-item active" aria-current="page">Nuevo</li>
{% endblock %}

{% block page_title %}Nuevo caso{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" action="{{ request.url_for('postventa_caso_nuevo_post') }}">
      <div class="row g-2">
        <div class="col-md-6">
          <label class="form-label">Cliente</label>
          <select class="form-select" name="cliente_id" required>
            <option value="">Seleccione...</option>
            {% for c in clientes %}
            <option value="{{ c.id }}" {% if cliente_id==c.id %}selected{% endif %}>{{ c.razon_social }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Origen</label>
          <select class="form-select" name="origen">
            {% for o in ['WEB','EMAIL','TELEFONO','WHATSAPP','INTERNO','OTRO'] %}
            <option value="{{ o }}">{{ o }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Categoría</label>
          <select class="form-select" name="categoria">
            {% for c in ['CONSULTA','RECLAMO','GARANTIA','MEJORA','PEDIDO','OTRO'] %}
            <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Prioridad</label>
          <select class="form-select" name="prioridad">
            {% for p in ['BAJA','MEDIA','ALTA','URGENTE'] %}
            <option value="{{ p }}" {% if p=='MEDIA' %}selected{% endif %}>{{ p }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <label class="form-label mt-2">Título</label>
      <input class="form-control mb-2" name="titulo" required maxlength="250">
      <label class="form-label">Descripción</label>
      <textarea class="form-control mb-3" name="descripcion" rows="5" required></textarea>
      <button class="btn btn-primary">Crear caso</button>
    </form>
  </div>
</div>
{% endblock %}
