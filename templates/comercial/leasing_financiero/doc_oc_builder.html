{% extends "layout/base.html" %}
{% block title %}Orden de compra — Cotización {{ cotizacion.id }}{% endblock %}
{% block head %}<link rel="stylesheet" href="/static/css/leasing_financiero.css">{% endblock %}
{% block content %}
<div class="container py-4">
  <a href="{{ request.url_for('lf_cotizacion_detalle', cotizacion_id=cotizacion.id) }}" class="small text-decoration-none">← Volver al detalle</a>
  <h1 class="h5 lf-title mt-2 mb-3">Orden de compra — Cotización #{{ cotizacion.id }}</h1>
  <div class="card lf-card shadow-sm border-0">
    <div class="card-body">
      <form method="post" action="{{ request.url_for('lf_doc_oc_save', cotizacion_id=cotizacion.id) }}" class="row g-3">
        <div class="col-md-6"><label class="form-label">Proveedor / concesionario</label><input name="proveedor_nombre" class="form-control" value="{{ doc.get('proveedor_nombre', cotizacion.concesionario or '') }}" required></div>
        <div class="col-md-3"><label class="form-label">N° orden</label><input name="numero_documento" class="form-control" value="{{ doc.get('numero_documento', '') }}" required></div>
        <div class="col-md-3"><label class="form-label">Fecha</label><input type="date" name="fecha_documento" class="form-control" value="{{ doc.get('fecha_documento', '') }}" required></div>
        <div class="col-md-4"><label class="form-label">Monto OC</label><input name="monto_oc" class="form-control" value="{{ doc.get('monto_oc', cotizacion.valor_neto or '') }}"></div>
        <div class="col-md-4"><label class="form-label">Bien</label><input name="bien_descripcion" class="form-control" value="{{ doc.get('bien_descripcion', cotizacion.bien_descripcion or '') }}"></div>
        <div class="col-md-4"><label class="form-label">Estado documento</label><select name="estado_documento" class="form-select"><option>RECIBIDO</option><option>VALIDADO</option><option>PENDIENTE</option><option>RECHAZADO</option></select></div>
        <div class="col-12"><label class="form-label">Observación</label><textarea name="observacion" class="form-control" rows="2">{{ doc.get('observacion', '') }}</textarea></div>
        <div class="col-12"><button class="btn btn-lf-primary" type="submit">Guardar orden de compra</button></div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
