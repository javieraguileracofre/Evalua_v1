{% extends "layout/base.html" %}
{% block title %}Editar cotización {{ cotizacion.id }}{% endblock %}
{% block head %}<link rel="stylesheet" href="/static/css/leasing_financiero.css">{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h5 lf-title mb-0">Editar cotización #{{ cotizacion.id }}</h1>
    <a href="{{ request.url_for('lf_cotizacion_detalle', cotizacion_id=cotizacion.id) }}" class="btn btn-sm btn-outline-secondary">← Detalle</a>
  </div>
  <form method="post" action="{{ request.url_for('lf_cotizacion_editar_post', cotizacion_id=cotizacion.id) }}" class="card lf-card p-3 shadow-sm border-0">
    <div class="lf-section mb-3">Parámetros financieros</div>
    <div class="row g-3">
      <div class="col-md-3"><label class="form-label small">Valor neto</label><input class="form-control" name="valor_neto" value="{{ cotizacion.valor_neto or '' }}"></div>
      <div class="col-md-3"><label class="form-label small">Monto financiado</label><input class="form-control" name="monto_financiado" value="{{ cotizacion.monto_financiado or '' }}"></div>
      <div class="col-md-2"><label class="form-label small">Moneda</label><input class="form-control" name="moneda" value="{{ cotizacion.moneda or 'CLP' }}"></div>
      <div class="col-md-2"><label class="form-label small">Tasa</label><input class="form-control" name="tasa" value="{{ cotizacion.tasa or '' }}"></div>
      <div class="col-md-2"><label class="form-label small">Plazo</label><input class="form-control" name="plazo" value="{{ cotizacion.plazo or '' }}"></div>
      <div class="col-md-3"><label class="form-label small">Fecha inicio</label><input class="form-control" type="date" name="fecha_inicio" value="{{ cotizacion.fecha_inicio or '' }}"></div>
      <div class="col-md-3"><label class="form-label small">Opción compra</label><input class="form-control" name="opcion_compra" value="{{ cotizacion.opcion_compra or '' }}"></div>
      <div class="col-md-3"><label class="form-label small">Gracia (meses)</label><input class="form-control" name="periodos_gracia" value="{{ cotizacion.periodos_gracia or 0 }}"></div>
      <div class="col-md-3"><label class="form-label small">UF / USD</label>
        <div class="input-group input-group-sm">
          <input class="form-control" name="uf_valor" placeholder="UF" value="{{ cotizacion.uf_valor or '' }}">
          <input class="form-control" name="dolar_valor" placeholder="USD" value="{{ cotizacion.dolar_valor or '' }}">
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label small">Estado</label>
        <select class="form-select" name="estado">
          {% set cur = (cotizacion.estado or 'BORRADOR')|upper %}
          {% for e in ['BORRADOR','COTIZADA','EN_ANALISIS_COMERCIAL','EN_ANALISIS_CREDITO','APROBADA_CONDICIONES','APROBADA','RECHAZADA','EN_FORMALIZACION','DOCUMENTACION_COMPLETA','ACTIVADA','VIGENTE','ANULADA','PERDIDA_CLIENTE'] %}
          <option value="{{ e }}" {% if cur == e %}selected{% endif %}>{{ e }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4"><label class="form-label small">Bien financiado</label><input class="form-control" name="bien_descripcion" value="{{ cotizacion.bien_descripcion or '' }}"></div>
      <div class="col-md-4"><label class="form-label small">Observaciones</label><input class="form-control" name="observaciones" value="{{ cotizacion.observaciones or '' }}"></div>
    </div>
    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-lf-primary btn-sm" type="submit">Guardar cambios</button>
      <a class="btn btn-outline-secondary btn-sm" href="{{ request.url_for('lf_cotizacion_amortizacion', cotizacion_id=cotizacion.id) }}">Ver amortización</a>
    </div>
  </form>
</div>
{% endblock %}
