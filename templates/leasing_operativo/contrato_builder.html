{% extends "layout/base.html" %}
{% block title %}Confección contrato LOP{% endblock %}
{% block content %}
<div class="container py-4">
  <a href="{{ request.url_for('leasing_operativo_detail', sim_id=sim.id) }}" class="small text-decoration-none">← Volver a operación</a>
  <h1 class="h5 mt-2 mb-3">Confección de contrato — {{ sim.codigo }}</h1>
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <form method="post" action="{{ request.url_for('leasing_operativo_contrato_builder_save', sim_id=sim.id) }}" class="row g-3">
        <div class="col-md-4">
          <label class="form-label">N° contrato</label>
          <input name="nro_contrato" class="form-control" value="{{ doc.get('nro_contrato', '') }}" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">Fecha contrato</label>
          <input type="date" name="fecha_contrato" class="form-control" value="{{ doc.get('fecha_contrato', '') }}" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">Lugar firma</label>
          <input name="lugar_firma" class="form-control" value="{{ doc.get('lugar_firma', '') }}" />
        </div>
        <div class="col-12">
          <label class="form-label">Cláusulas / observaciones de confección</label>
          <textarea name="observaciones" class="form-control" rows="5">{{ doc.get('observaciones', '') }}</textarea>
        </div>
        <div class="col-12 d-grid">
          <button class="btn btn-primary" type="submit">Guardar contrato para firma física</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
